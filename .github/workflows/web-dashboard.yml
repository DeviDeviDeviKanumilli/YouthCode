name: Web Dashboard

on:
  push:
    paths:
      - ".github/workflows/web-dashboard.yml"
      - "apps/web/**"
  pull_request:
    paths:
      - ".github/workflows/web-dashboard.yml"
      - "apps/web/**"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run build
