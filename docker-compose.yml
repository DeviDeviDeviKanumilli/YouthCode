services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - ./apps/api/.env.example
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://ecosentinel:ecosentinel@postgres:5432/ecosentinel
      REDIS_URL: redis://redis:6379/0
      LOCAL_STORAGE_DIR: /app/.local/storage
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
      - api-storage:/app/.local/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgis/postgis:16-3.5
    environment:
      POSTGRES_DB: ecosentinel
      POSTGRES_USER: ecosentinel
      POSTGRES_PASSWORD: ecosentinel
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./apps/api/docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecosentinel -d ecosentinel"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    profiles:
      - storage
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ecosentinel
      MINIO_ROOT_PASSWORD: ecosentinel-dev-password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  api-storage:
  postgres-data:
  minio-data:
